<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrax Deals | La Boutique de BBachir</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #ff5000; --gold: #f59e0b; --dark: #0a0f1e; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--dark); color: white; text-align: center; }
        .hero { padding: 80px 20px; background: radial-gradient(circle at top, #1e293b 0%, #0a0f1e 100%); border-bottom: 2px solid var(--orange); }
        .logo { font-family: 'Montserrat'; font-size: 2.5rem; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
        .container { max-width: 900px; margin: 50px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #1e293b; padding: 40px 20px; border-radius: 20px; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--orange); box-shadow: 0 10px 30px rgba(255,80,0,0.2); }
        .cat-title { font-family: 'Montserrat'; font-size: 1.5rem; color: white; margin: 15px 0; }
        .btn { background: var(--orange); color: white; padding: 12px 25px; border-radius: 10px; font-weight: 800; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">Vrax Deals</div>
        <p style="letter-spacing: 2px; font-weight: 700; color: var(--orange);">SÉLECTION OFFICIELLE BBACHIR</p>
    </div>
    <div class="container">
        <h2 style="margin-bottom: 40px;">Choisissez votre rayon :</h2>
        <div class="grid">
            <a href="cuisine.html" class="card">
                <div style="font-size: 3rem;">🍳</div>
                <div class="cat-title">Cuisine & Maison</div>
                <div class="btn">ENTRER</div>
            </a>
            <a href="hightech.html" class="card">
                <div style="font-size: 3rem;">📱</div>
                <div class="cat-title">High-Tech</div>
                <div class="btn">ENTRER</div>
            </a>
        </div>
    </div>
    <footer style="margin-top: 100px; opacity: 0.5; font-size: 0.8rem; padding-bottom: 50px;">© 2026 Vrax Deals | Partenaire Temu & Amazon</footer>
</body>
</html>
