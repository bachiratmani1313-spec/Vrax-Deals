<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Tech & Solaire | Vrax Deals</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue-tech: #3b82f6; --cyan: #06b6d4; --dark: #020617; --card: #0f172a; }
        
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; }
        
        .navbar { background: rgba(2, 6, 23, 0.9); padding: 1.5rem; border-bottom: 1px solid rgba(59, 130, 246, 0.3); text-align: center; }
        .logo { font-size: 1.8rem; color: var(--cyan); font-weight: 900; text-decoration: none; letter-spacing: 2px; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        
        .header-title { text-align: center; margin-bottom: 60px; }
        .header-title h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 3.5rem; margin: 0; color: white; }
        .header-title p { color: var(--blue-tech); font-weight: 400; letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }

        .card { 
            background: var(--card); 
            border-radius: 30px; 
            padding: 50px 30px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 450px;
        }
        
        .card:hover { 
            transform: translateY(-15px); 
            border-color: var(--cyan); 
            box-shadow: 0 25px 60px rgba(59, 130, 246, 0.15); 
        }

        .category-tag {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--cyan);
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .product-title { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-weight: 900; 
            font-size: 2.5rem; 
            line-height: 1;
            color: white;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .price-tag { 
            font-size: 2.8rem; 
            font-weight: 900; 
            color: var(--cyan); 
            margin: 25px 0; 
            font-family: 'Montserrat';
        }

        .btn-action { 
            background: linear-gradient(45deg, #2563eb, #0891b2);
            color: white; 
            text-decoration: none; 
            padding: 20px; 
            border-radius: 15px; 
            font-weight: 900; 
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-action:hover { 
            letter-spacing: 5px;
            filter: brightness(1.2);
        }

        footer { padding: 80px; text-align: center; color: rgba(255,255,255,0.2); font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">VRAX DEALS</a>
    </nav>

    <div class="container">
        <div class="header-title">
            <p>Future Essentials</p>
            <h1>High-Tech & Solaire</h1>
        </div>

        <div class="grid">
            <div class="card">
                <div class="category-tag">Cinematic Tool</div>
                <div class="product-title">Cardan<br>Gimbal<br>Pro</div>
                <div class="price-tag">32.99€</div>
                <a href="https://temu.to/k/em4mczx5jgy" target="_blank" class="btn-action">Voir l'innovation</a>
            </div>

            <div class="card">
                <div class="category-tag">Smart Energy</div>
                <div class="product-title">Caméra<br>Solaire<br>4G</div>
                <div class="price-tag">32.02€</div>
                <a href="https://temu.to/k/e3a9ggyfthw" target="_blank" class="btn-action">Voir l'innovation</a>
            </div>

            <div class="card">
                <div class="category-tag">Travel Tech</div>
                <div class="product-title">Tasse<br>Chauffante<br>1L</div>
                <div class="price-tag">19.76€</div>
                <a href="https://temu.to/k/e08s7ltti14" target="_blank" class="btn-action">Voir l'innovation</a>
            </div>
        </div>
    </div>

    <footer>© 2026 VRAX DEALS BY BBACHIR • HIGH-TECH SELECTION</footer>

</body>
</html>
